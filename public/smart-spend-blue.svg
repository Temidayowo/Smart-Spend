<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter+Tight:ital,wght@0,100..900;1,100..900&display=swap');
</style>

  <!-- Coin -->
  <g transform="translate(0,10)">
    <!-- Outer ring -->
    <circle cx="50" cy="50" r="47" stroke="#BFDBFE" stroke-width="2.5" fill="none"/>
    
    <!-- Inner ring -->
    <circle cx="50" cy="50" r="40" stroke="#DBEAFE" stroke-width="1" fill="none"/>
    
    <!-- Fill -->
    <circle cx="50" cy="50" r="39" fill="#EFF6FF"/>

    <!-- S letter -->
    <text
      x="50"
      y="53"
      text-anchor="middle"
      dominant-baseline="middle"
      font-size="56"
      font-weight="900"
      font-family="Fraunces, serif"
      font-style="italic"
      fill="#1D4ED8"
    >S</text>

    <!-- Upward tick -->
    <polyline
      points="68,26 76,16 84,16"
      stroke="#2563EB"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />

    <line
      x1="84" y1="16"
      x2="84" y2="25"
      stroke="#2563EB"
      stroke-width="3.5"
      stroke-linecap="round"
    />
  </g>

  <!-- Wordmark -->
  <g transform="translate(120,55)">
    <text
      x="0"
      y="0"
      font-family="Fraunces, serif"
      font-size="34"
      font-weight="700"
      font-style="italic"
      fill="#0F172A"
      letter-spacing="-0.5"
    >
      SpendSmart
    </text>

    <text
      x="2"
      y="24"
      font-family="Sora, sans-serif"
      font-size="11"
      font-weight="600"
      fill="#94A3B8"
      letter-spacing="2.5"
    >
      PERSONAL FINANCE
    </text>
  </g>

</svg>